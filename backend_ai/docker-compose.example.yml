# 사용법: backend_ai 폴더에서
#   copy .env.example .env  후 키 입력
#   docker compose -f docker-compose.example.yml up --build
#
# 또는 CI/서버에서 환경 변수만 주입:
#   docker run -e GROQ_API_KEY=... -e GOOGLE_API_KEY=... -p 8000:8000 ...

services:
  backend_ai:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
